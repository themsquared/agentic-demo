# MCP routes — one HTTPRoute with a rule per MCP server. Each MCP backend gets
# its own path under /mcp on the shared AgentGateway proxy. Note the two API
# groups: OSS backends use agentgateway.dev, composable ones use
# enterpriseagentgateway.solo.io.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-all
  namespace: agentgateway-system
spec:
  parentRefs:
  - name: agentgateway-proxy
    namespace: agentgateway-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /mcp/website
    backendRefs:
    - name: mcp-website-fetcher
      namespace: agentgateway-system
      group: agentgateway.dev
      kind: AgentgatewayBackend
  - matches:
    - path:
        type: PathPrefix
        value: /mcp/github-remote
    backendRefs:
    - name: github-mcp
      namespace: agentgateway-system
      group: agentgateway.dev
      kind: AgentgatewayBackend
  - matches:
    - path:
        type: PathPrefix
        value: /mcp/weather
    backendRefs:
    - name: weather-mcp
      namespace: agentgateway-system
      group: enterpriseagentgateway.solo.io
      kind: EnterpriseAgentgatewayBackend
  - matches:
    - path:
        type: PathPrefix
        value: /mcp/github-profile
    backendRefs:
    - name: github-profile-mcp
      namespace: agentgateway-system
      group: enterpriseagentgateway.solo.io
      kind: EnterpriseAgentgatewayBackend

# GitHub Profile — a MULTI-STEP composable MCP. Still zero code.
# This tool makes TWO sequential HTTP calls and merges them:
#   Step 1 (user):  GET /users/{username}        → profile
#   Step 2 (repos): GET /users/{username}/repos  → recent repositories
#   output:         CEL expression combines both into one summary string
#
# Later steps can reference earlier step results by name (output.user, output.repos).
# Exposed at /mcp/github-profile (see routes.yaml).

# Upstream: the public GitHub REST API.
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayBackend
metadata:
  name: github-api
  namespace: agentgateway-system
spec:
  static:
    host: api.github.com
    port: 443
  policies:
    tls:
      sni: api.github.com   # TLS origination lives under spec.policies.tls
---
apiVersion: enterpriseagentgateway.solo.io/v1alpha1
kind: EnterpriseAgentgatewayBackend
metadata:
  name: github-profile-mcp
  namespace: agentgateway-system
spec:
  entMcp:
    targets:
    - name: github-user-summary
      custom:
        description: "Fetch a GitHub user's profile and recent repositories."
        inputSchema:
          type: object
          additionalProperties: false
          required: [username]
          properties:
            username:
              type: string
              description: "GitHub username (e.g. 'octocat')"
        steps:
        - name: user                       # ← step 1, result available as output.user
          http:
            backendRef:
              group: enterpriseagentgateway.solo.io
              kind: EnterpriseAgentgatewayBackend
              name: github-api
            method: GET
            path: '"/users/" + input.username'
            headers:
            - name: User-Agent
              value: '"agentgateway-demo"'
            - name: Accept
              value: '"application/vnd.github+json"'
        - name: repos                      # ← step 2, result available as output.repos
          http:
            backendRef:
              group: enterpriseagentgateway.solo.io
              kind: EnterpriseAgentgatewayBackend
              name: github-api
            method: GET
            path: '"/users/" + input.username + "/repos?sort=updated&per_page=5"'
            headers:
            - name: User-Agent
              value: '"agentgateway-demo"'
            - name: Accept
              value: '"application/vnd.github+json"'
        # Merge both step results into one output string
        output: |
          "GitHub Profile: " + output.user.login
          + " (" + (output.user.name != null ? output.user.name : "no name") + ")"
          + "\nBio: " + (output.user.bio != null ? output.user.bio : "none")
          + "\nPublic repos: " + string(output.user.public_repos)
          + "\nFollowers: " + string(output.user.followers)
          + "\nRecent repos: " + output.repos.map(r, r.name).join(", ")

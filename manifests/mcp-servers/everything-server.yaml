# mcp-server-everything — a real MCP server workload (the MCP reference
# "everything" server: echo, add, longRunningOperation, etc.). Used in Act 6 as
# the SUBJECT of a "promotion": it starts life reachable only at its raw in-cluster
# Service, then gets promoted onto AgentGateway and federated behind one endpoint.
#
# Service note: appProtocol: agentgateway.dev/mcp marks it as an MCP backend, and
# it speaks Streamable HTTP — which is what AGW label-selector federation requires.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server-everything
  namespace: agentgateway-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-server-everything
  template:
    metadata:
      labels:
        app: mcp-server-everything
    spec:
      containers:
      - name: mcp-server-everything
        image: node:20-alpine
        command: ["npx"]
        args: ["-y", "@modelcontextprotocol/server-everything", "streamableHttp"]
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server-everything
  namespace: agentgateway-system
  labels:
    app: mcp-server-everything
spec:
  selector:
    app: mcp-server-everything
  ports:
  - protocol: TCP
    port: 3001
    targetPort: 3001
    appProtocol: agentgateway.dev/mcp

# istiod alias Service — REQUIRED for BYO-agent (AgentRegistry-promoted) waypoints.
#
# Solo's ambient install names the control plane `istiod-gloo`, but ambient
# waypoints are generated with the conventional CA address
# `https://istiod.istio-system.svc:15012`. With no `istiod` Service that name
# fails DNS resolution, the waypoint can't fetch its mTLS certificate
# ("backends required DNS resolution which failed"), and ALL traffic to any
# waypoint-fronted workload is reset.
#
# kagent attaches a per-agent waypoint to every BYO (image-based) agent — the
# kind AgentRegistry promotes onto the kagent runtime — so without this alias
# the promoted agent deploys and runs but is unreachable in-mesh (UI chat,
# A2A delegation). Declarative agents have no waypoint and are unaffected, which
# is why this only bites once you promote an agent from the registry.
#
# This Service selects the same pods as istiod-gloo, so `istiod.istio-system.svc`
# resolves to the real control plane and waypoints get certs.
apiVersion: v1
kind: Service
metadata:
  name: istiod
  namespace: istio-system
  labels:
    app: istiod
    solo-demo/alias-for: istiod-gloo
spec:
  selector:
    app: istiod
    istio.io/rev: gloo
  ports:
  - { name: grpc-xds,        port: 15010, targetPort: 15010 }
  - { name: https-dns,       port: 15012, targetPort: 15012 }
  - { name: https-webhook,   port: 443,   targetPort: 15017 }
  - { name: http-monitoring, port: 15014, targetPort: 15014 }
